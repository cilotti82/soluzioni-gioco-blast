<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Block Blast Solver</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f766e">
<style>
*{box-sizing:border-box}body{margin:0;background:#f5f7fb;color:#14212e;font-family:system-ui,-apple-system,Segoe UI,sans-serif}main{width:min(1180px,calc(100vw - 20px));margin:auto;padding:14px 0 24px}header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}h1{font-size:24px;margin:0}.status{background:white;border:1px solid #d7e0e8;border-radius:999px;padding:8px 12px;color:#667085;font-size:13px}.layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}.panel{background:white;border:1px solid #d7e0e8;border-radius:8px;box-shadow:0 12px 28px #16202a12;overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;border-bottom:1px solid #d7e0e8}.body{padding:12px}.tools{display:flex;flex-wrap:wrap;gap:8px}.file{display:inline-flex;align-items:center;border:1px dashed #9fb0c0;border-radius:8px;padding:0 12px;height:38px;background:#f8fafc}.file input{display:none}button{height:38px;border:1px solid #d7e0e8;border-radius:8px;background:white;padding:0 12px;font:inherit}button.primary{background:#0f766e;color:white;border-color:#0f766e;font-weight:700}.board,.piece{display:grid;background:#203244;gap:2px;border:2px solid #203244;border-radius:8px;overflow:hidden;touch-action:manipulation}.board{grid-template-columns:repeat(8,1fr);aspect-ratio:1/1}.piece{grid-template-columns:repeat(5,1fr);aspect-ratio:1/1}.cell,.pcell{border:0;border-radius:0;height:auto;padding:0;min-height:0;background:#edf2f7}.cell.on{background:linear-gradient(135deg,#60a5fa,#1d4ed8)}.pcell.on{background:linear-gradient(135deg,#fbbf24,#e9892f)}.pieces{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.piecebox{border:1px solid #d7e0e8;border-radius:8px;padding:8px;background:#fbfcfe}.piecebox h3{margin:0 0 6px;font-size:14px}.canvas{width:100%;min-height:260px;border:1px solid #d7e0e8;border-radius:8px;background:#eef3f7;display:block}.result{white-space:pre-wrap;background:#fbfcfe;border:1px dashed #a9bac9;border-radius:8px;min-height:180px;padding:12px;color:#334155}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}.metric{border:1px solid #d7e0e8;border-radius:8px;padding:10px;background:#fbfcfe}.metric strong{display:block;font-size:22px}@media(max-width:820px){.layout{grid-template-columns:1fr}header{align-items:flex-start;flex-direction:column}.pieces,.metrics{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<header><h1>Block Blast Solver</h1><div id="status" class="status">Pronto</div></header>
<div class="layout">
<section class="panel"><div class="head"><strong>Screenshot</strong><div class="tools"><label class="file">Immagine<input id="file" type="file" accept="image/*"></label><button id="auto">Auto</button></div></div><div class="body"><canvas id="cv" class="canvas" width="591" height="900"></canvas></div></section>
<section class="panel"><div class="head"><strong>Griglia e pezzi</strong><div class="tools"><button id="solve" class="primary">Risolvi</button><button id="clear">Svuota</button></div></div><div class="body"><div id="board" class="board"></div><div id="pieces" class="pieces"></div></div></section>
<section class="panel" style="grid-column:1/-1"><div class="head"><strong>Soluzione</strong><button id="copy">Copia</button></div><div class="body"><div class="metrics"><div class="metric"><strong id="mPieces">0</strong><span>pezzi</span></div><div class="metric"><strong id="mLines">0</strong><span>linee</span></div><div class="metric"><strong id="mEmpty">64</strong><span>vuote</span></div></div><div id="out" class="result">Carica uno screenshot o compila a mano.</div></div></section>
</div>
</main>
<script>
const N=8,P=5,names=['A','B','C'];let img=null,board=mat(N,N,false),pieces=names.map(()=>mat(P,P,false)),last='';
const $=id=>document.getElementById(id),cv=$('cv'),ctx=cv.getContext('2d',{willReadFrequently:true});
function mat(r,c,v){return Array.from({length:r},()=>Array(c).fill(v))}function cells(m){let a=[];m.forEach((r,y)=>r.forEach((v,x)=>{if(v)a.push([y,x])}));return a}function norm(a){if(!a.length)return[];let mr=Math.min(...a.map(x=>x[0])),mc=Math.min(...a.map(x=>x[1]));return a.map(([r,c])=>[r-mr,c-mc]).sort((a,b)=>a[0]-b[0]||a[1]-b[1])}function clone(b){return b.map(r=>r.slice())}
function render(){let b=$('board');b.innerHTML='';for(let r=0;r<N;r++)for(let c=0;c<N;c++){let x=document.createElement('button');x.className='cell'+(board[r][c]?' on':'');x.title=`R${r+1} C${c+1}`;x.onclick=()=>{board[r][c]=!board[r][c];render()};b.appendChild(x)}let ps=$('pieces');ps.innerHTML='';pieces.forEach((p,i)=>{let box=document.createElement('div');box.className='piecebox';box.innerHTML=`<h3>Pezzo ${names[i]}</h3>`;let g=document.createElement('div');g.className='piece';for(let r=0;r<P;r++)for(let c=0;c<P;c++){let x=document.createElement('button');x.className='pcell'+(p[r][c]?' on':'');x.onclick=()=>{pieces[i][r][c]=!pieces[i][r][c];render()};g.appendChild(x)}let cl=document.createElement('button');cl.textContent='Pulisci';cl.style.marginTop='6px';cl.onclick=()=>{pieces[i]=mat(P,P,false);render()};box.appendChild(g);box.appendChild(cl);ps.appendChild(box);});$('mEmpty').textContent=empty(board)}
function set(s){$('status').textContent=s}function draw(){ctx.clearRect(0,0,cv.width,cv.height);if(!img){ctx.fillStyle='#eef3f7';ctx.fillRect(0,0,cv.width,cv.height);ctx.fillStyle='#647386';ctx.textAlign='center';ctx.fillText('Carica screenshot',cv.width/2,cv.height/2);return}ctx.drawImage(img,0,0,cv.width,cv.height)}
$('file').onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{img=new Image();img.onload=()=>{let sc=Math.min(820/img.width,950/img.height,1);cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);draw();autoRead();};img.src=r.result};r.readAsDataURL(f)};$('auto').onclick=()=>autoRead();$('clear').onclick=()=>{board=mat(N,N,false);pieces=names.map(()=>mat(P,P,false));render();set('Svuotato')};$('solve').onclick=solveUI;$('copy').onclick=()=>navigator.clipboard&&navigator.clipboard.writeText(last);
function px(data,x,y){let i=(y*data.width+x)*4;return[data.data[i]/255,data.data[i+1]/255,data.data[i+2]/255]}function isBlock(r,g,b){let mx=Math.max(r,g,b),mn=Math.min(r,g,b),sat=mx?((mx-mn)/mx):0,lum=.2126*r+.7152*g+.0722*b;return mx>.42&&sat>.25&&lum>.20}function isCyan(r,g,b){let mx=Math.max(r,g,b),mn=Math.min(r,g,b),sat=mx?((mx-mn)/mx):0;return g>.48&&b>.58&&r<.38&&sat>.42}function clamp(v,a,b){return Math.min(b,Math.max(a,v))}
function sample(data,x,y,w,h,m=.28){let l=clamp(Math.floor(x+w*m),0,data.width-1),t=clamp(Math.floor(y+h*m),0,data.height-1),rr=clamp(Math.ceil(x+w*(1-m)),0,data.width-1),bb=clamp(Math.ceil(y+h*(1-m)),0,data.height-1),n=0,hit=0,br=0,sat=0;for(let yy=t;yy<=bb;yy+=2)for(let xx=l;xx<=rr;xx+=2){let [r,g,b]=px(data,xx,yy),mx=Math.max(r,g,b),mn=Math.min(r,g,b);if(isBlock(r,g,b))hit++;br+=.2126*r+.7152*g+.0722*b;sat+=mx?((mx-mn)/mx):0;n++}return{ratio:n?hit/n:0,br:n?br/n:0,sat:n?sat/n:0}}
function peakRows(data,a,b){let best={p:0,s:0};for(let y=Math.floor(a);y<=b;y++){let s=0;for(let x=0;x<data.width;x+=2){let p=px(data,x,y);if(isCyan(...p))s++}if(s>best.s)best={p:y,s}}return best.s>data.width*.012?best:null}function peakCols(data,a,b,y1,y2){let best={p:0,s:0};for(let x=Math.floor(a);x<=b;x++){let s=0;for(let y=y1;y<=y2;y+=2){let p=px(data,x,y);if(isCyan(...p))s++}if(s>best.s)best={p:x,s}}return best.s>(y2-y1)*.012?best:null}
function boardRect(data){let w=data.width,h=data.height,rt=peakRows(data,h*.2,h*.34),rb=peakRows(data,h*.58,h*.72);if(rt&&rb){let cl=peakCols(data,w*.01,w*.16,rt.p,rb.p),cr=peakCols(data,w*.84,w*.99,rt.p,rb.p);if(cl&&cr){let side=Math.min(cr.p-cl.p,rb.p-rt.p),inset=side*.024;return{x:cl.p+inset,y:rt.p+inset,s:side-inset*2}}}let s=Math.min(w*.89,h*.42);return{x:w*.055,y:h*.235,s}}
function autoRead(){if(!img){set('Carica prima uno screenshot');return}draw();let data=ctx.getImageData(0,0,cv.width,cv.height),r=boardRect(data),cell=r.s/N;board=mat(N,N,false);for(let y=0;y<N;y++)for(let x=0;x<N;x++){let sm=sample(data,r.x+x*cell,r.y+y*cell,cell,cell);board[y][x]=sm.ratio>.12||(sm.br>.31&&sm.sat>.28)}pieces=detectPieces(data,r);render();set(`Auto: ${cells(board).length} celle, ${pieces.filter(p=>cells(p).length).length} pezzi`)}
function detectPieces(data,r){let w=data.width,h=data.height,y0=Math.floor(r.y+r.s+h*.045),y1=Math.min(h-1,Math.ceil(r.y+r.s+h*.25)),mask=new Uint8Array(w*(y1-y0));for(let y=y0;y<y1;y++)for(let x=0;x<w;x++){if(isBlock(...px(data,x,y)))mask[(y-y0)*w+x]=1}let comps=[],seen=new Uint8Array(mask.length),H=y1-y0,dirs=[[1,0],[-1,0],[0,1],[0,-1]];for(let y=0;y<H;y++)for(let x=0;x<w;x++){let id=y*w+x;if(!mask[id]||seen[id])continue;let q=[[x,y]],minx=x,maxx=x,miny=y,maxy=y,a=0;seen[id]=1;for(let i=0;i<q.length;i++){let [qx,qy]=q[i];a++;minx=Math.min(minx,qx);maxx=Math.max(maxx,qx);miny=Math.min(miny,qy);maxy=Math.max(maxy,qy);dirs.forEach(([dx,dy])=>{for(let k=1;k<=4;k++){let nx=qx+dx*k,ny=qy+dy*k,ni=ny*w+nx;if(nx<0||nx>=w||ny<0||ny>=H||seen[ni]||!mask[ni])return;seen[ni]=1;q.push([nx,ny])}})}if(a>r.s*r.s*.001)comps.push({x:minx,y:miny+y0,w:maxx-minx+1,h:maxy-miny+1,a})}return comps.sort((a,b)=>b.a-a.a).slice(0,3).sort((a,b)=>a.x-b.x).map(c=>{let guess=r.s/18.2,rows=clamp(Math.round(c.h/guess),1,P),cols=clamp(Math.round(c.w/guess),1,P),p=mat(P,P,false);for(let yy=0;yy<rows;yy++)for(let xx=0;xx<cols;xx++){let sm=sample(data,c.x+xx*c.w/cols,c.y+yy*c.h/rows,c.w/cols,c.h/rows,.12);p[yy][xx]=sm.ratio>.10||(sm.br>.30&&sm.sat>.30)}let n=norm(cells(p)),m=mat(P,P,false);n.forEach(([yy,xx])=>m[yy][xx]=true);return m})}
function empty(b){let n=0;b.forEach(r=>r.forEach(v=>{if(!v)n++}));return n}function bounds(c){return{r:Math.max(...c.map(x=>x[0]))+1,c:Math.max(...c.map(x=>x[1]))+1}}function can(b,cells,row,col){return cells.every(([r,c])=>row+r<N&&col+c<N&&!b[row+r][col+c])}function place(b,p,row,col){let nb=clone(b),placed=[];p.cells.forEach(([r,c])=>{nb[row+r][col+c]=true;placed.push([row+r,col+c])});let rows=[],cols=[];for(let r=0;r<N;r++)if(nb[r].every(Boolean))rows.push(r);for(let c=0;c<N;c++){let ok=true;for(let r=0;r<N;r++)if(!nb[r][c])ok=false;if(ok)cols.push(c)}rows.forEach(r=>{for(let c=0;c<N;c++)nb[r][c]=false});cols.forEach(c=>{for(let r=0;r<N;r++)nb[r][c]=false});return{b:nb,placed,lines:[...rows.map(r=>'R'+(r+1)),...cols.map(c=>'C'+(c+1))]}}
function solveUI(){let ps=pieces.map((p,i)=>({name:names[i],cells:norm(cells(p))})).filter(p=>p.cells.length);if(ps.length!==3){set('Servono 3 pezzi');return}let best=null,count=0;function dfs(b,rem,moves,lines){count++;if(!rem.length)return take(b,moves,lines);let any=false;for(let i=0;i<rem.length;i++){let p=rem[i],bd=bounds(p.cells);for(let r=0;r<=N-bd.r;r++)for(let c=0;c<=N-bd.c;c++)if(can(b,p.cells,r,c)){any=true;let nx=place(b,p,r,c);dfs(nx.b,rem.filter((_,j)=>j!==i),moves.concat({p:p.name,r,c,placed:nx.placed,lines:nx.lines}),lines+nx.lines.length)}}if(!any)take(b,moves,lines)}function take(b,m,l){let score=m.length*1e6+l*3e4+empty(b)*350;if(!best||score>best.score)best={m,l,e:empty(b),score}}dfs(board,ps,[],0);$('mPieces').textContent=best.m.length;$('mLines').textContent=best.l;$('mEmpty').textContent=best.e;last=`Stati esplorati: ${count}\nPezzi piazzati: ${best.m.length}/3\nLinee cancellate: ${best.l}\n\n`+best.m.map((m,i)=>`${i+1}. Pezzo ${m.p}: R${m.r+1} C${m.c+1}\n   Celle: ${m.placed.map(([r,c])=>'R'+(r+1)+'C'+(c+1)).join(', ')}\n   Cancella: ${m.lines.length?m.lines.join(', '):'nessuna'}`).join('\n');$('out').textContent=last;set(best.m.length===3?'Soluzione completa':'Soluzione parziale')}
render();draw();if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('service-worker.js').catch(()=>{}));
</script>
</body>
</html>
